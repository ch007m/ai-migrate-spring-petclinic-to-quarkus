name: opencode

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  #pull_request_review_comment:
  #  types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc')
    #  startsWith(github.event.comment.body, '/oc') ||
    #  contains(github.event.comment.body, ' /opencode') ||
    #  startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}'

      #- name: Run opencode
      #  uses: anomalyco/opencode/github@latest
      #  env:
      #    GOOGLE_VERTEX_PROJECT: ${{ secrets.GOOGLE_VERTEX_PROJECT }}
      #    GOOGLE_VERTEX_LOCATION: ${{ secrets.GOOGLE_VERTEX_LOCATION }}
      #    GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
      #  with:
      #    model: google-vertex-anthropic/claude-opus-4-6@default

      - name: Get opencode version
        id: version
        shell: bash
        run: |
          VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

      - name: Cache opencode
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.opencode/bin
          key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

      - name: Install opencode
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        shell: bash
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Parse prompt message
        id: parse-comment
        run: |
            # Extract everything after 'opencode run '
            RAW_COMMENT="${{ github.event.comment.body }}"
            CMD=$(echo "$RAW_COMMENT" | sed 's/\/oc. //')
            echo "prompt=$CMD" >> $GITHUB_OUTPUT

      - name: Run opencode
        id: run_opencode
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL: google-vertex-anthropic/claude-opus-4-6@default
          GOOGLE_VERTEX_PROJECT: ${{ secrets.GOOGLE_VERTEX_PROJECT }}
          GOOGLE_VERTEX_LOCATION: ${{ secrets.GOOGLE_VERTEX_LOCATION }}
          # The env variable GOOGLE_APPLICATION_CREDENTIALS is set by the action google-github-actions/auth
        run: |
          mkdir -p "$HOME/.config/opencode/skills"
          touch "$HOME/.config/opencode/opencode.json"
          printf '{"$schema": "https://opencode.ai/config.json","permission": "allow"}\n' > "$HOME/.config/opencode/opencode.json"
          
          git clone https://github.com/quarkusio/quarkus-skills && cd quarkus-skills
          gh pr checkout 4
          cp -rp "skills/migrate-spring-to-quarkus/." "$HOME/.config/opencode/skills/migrate-spring-to-quarkus/"
          #ls -la "$HOME/.config/opencode/skills/migrate-spring-to-quarkus/"
          
          echo "Message: ${{ steps.parse-comment.outputs.prompt }}"
          
          opencode -v
        
          # Migrate this Spring Boot Application to Petclinic. Use as strategy: spring compat. Skip git management and proceed with migration." 
          opencode run -m ${{ env.MODEL }} "${{ steps.parse-comment.outputs.prompt }}"
          
          opencode stats
