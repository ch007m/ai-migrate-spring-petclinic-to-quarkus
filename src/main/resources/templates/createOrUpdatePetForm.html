{#include layout}
{#title}PetClinic :: Pet{/title}
{#menu}owners{/menu}
{#body}
  <h2>
    {#if pet.isNew()}New {/if}Pet
  </h2>
  <form class="form-horizontal" method="post">
    <input type="hidden" name="id" value="{pet.id.orEmpty}" />
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label">Owner</label>
        <div class="col-sm-10">
          <span>{owner.firstName.orEmpty} {owner.lastName.orEmpty}</span>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Name</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="name" value="{pet.name.orEmpty}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Birth Date</label>
        <div class="col-sm-10">
          <input class="form-control" type="date" name="birthDate" value="{pet.birthDate.orEmpty}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Type</label>
        <div class="col-sm-10">
          <select name="type">
            {#for item in types}
            <option value="{item.name}" {#if pet.type.orEmpty != '' && pet.type.name == item.name}selected{/if}>{item.name}</option>
            {/for}
          </select>
        </div>
      </div>
    </div>
    {#if errors.orEmpty}
    <div class="alert alert-danger">
      {#for error in errors}
        <p>{error}</p>
      {/for}
    </div>
    {/if}
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button class="btn btn-primary" type="submit">
          {#if pet.isNew()}Add Pet{#else}Update Pet{/if}
        </button>
      </div>
    </div>
  </form>
{/body}
{/include}
