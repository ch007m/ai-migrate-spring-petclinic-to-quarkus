name: opencode

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}'

      - name: Calculate Next Branch Name
        id: branch-math
        run: |
          # Get the last PR number
          PR_NUMBER=$(gh pr list --limit 1 --state all --json number --jq '.[0].number')
          NEXT_NUM=$((PR_NUMBER + 1))
          
          # Format with leading zero if needed (run-01, run-02...)
          BRANCH_NAME=$(printf "migration/run-%02d" $NEXT_NUM)
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup New Branch
        run: |
          echo "Branch name: ${{ steps.branch-math.outputs.branch_name }}"
          git checkout -b ${{ steps.branch-math.outputs.branch_name }}

      - name: Get opencode version
        id: version
        shell: bash
        run: |
          VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

      - name: Cache opencode
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.opencode/bin
          key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

      - name: Install opencode
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        shell: bash
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Parse prompt message
        id: parse-comment
        run: |
            # Extract everything after 'opencode run '
            RAW_COMMENT="${{ github.event.comment.body }}"
            CMD=$(echo "$RAW_COMMENT" | sed 's/\/oc. //')
            echo "prompt=$CMD" >> $GITHUB_OUTPUT

      - name: Run opencode
        id: run_opencode
        continue-on-error: false
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL: google-vertex-anthropic/claude-opus-4-6@default
          GOOGLE_VERTEX_PROJECT: ${{ secrets.GOOGLE_VERTEX_PROJECT }}
          GOOGLE_VERTEX_LOCATION: ${{ secrets.GOOGLE_VERTEX_LOCATION }}
          # The env variable GOOGLE_APPLICATION_CREDENTIALS is set by the action google-github-actions/auth
        run: |
          mkdir -p "$HOME/.config/opencode/skills"
          touch "$HOME/.config/opencode/opencode.json"
          printf '{"$schema": "https://opencode.ai/config.json","permission": "allow"}\n' > "$HOME/.config/opencode/opencode.json"
          
          git clone https://github.com/quarkusio/quarkus-skills && cd quarkus-skills
          gh pr checkout 4
          cp -rp "skills/migrate-spring-to-quarkus/." "$HOME/.config/opencode/skills/migrate-spring-to-quarkus/"
          
          cd ..
          rm -rf quarkus-skills
          
          opencode -v
          opencode run -m ${{ env.MODEL }} "${{ steps.parse-comment.outputs.prompt }}"
          opencode stats
          
          #echo "# Summary report" > migration-report.md
          #echo "" >> migration-report.md
          #echo "### Step 1" >> migration-report.md
          #echo "" >> migration-report.md
          #echo "### Step 2" >> migration-report.md
          #echo "---------------" >> migration-report.md

      - name: Prepare PR Description
        id: pr_desc
        run: |
          echo "PR_BODY<<EOF" >> "$GITHUB_ENV"
          echo "## OpenCode Migration Report" >> "$GITHUB_ENV"
          echo "Automated migration triggered by PR #3." >> "$GITHUB_ENV"
          echo "" >> "$GITHUB_ENV"
          echo "### Prompt Request" >> "$GITHUB_ENV"
          echo "> ${{ steps.parse.outputs.command }}" >> "$GITHUB_ENV"
          echo "" >> "$GITHUB_ENV"
          
          if [ -f "migration-report.md" ]; then
              cat migration-report.md >> "$GITHUB_ENV"
          else
              echo "No detailed report found." >> "$GITHUB_ENV"
          fi
          
          echo "EOF" >> "$GITHUB_ENV"

      - name: Push and Create PR
        if: success()
        run: |
          # Extract 'repo-name' from 'owner/repo-name'
          PROJECT_NAME=${GITHUB_REPOSITORY##*/}
          echo "PR description: $PR_BODY"
      
          git config --global user.name "OpenCode Quarkus Bot"
          git config --global user.email "quarkus-bot@opencode.ai"
      
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add .
          git commit -m "OpenCode migration: $PROJECT_NAME"
          git push origin ${{ steps.branch-math.outputs.branch_name }}
      
          # Create Draft PR using GitHub CLI
          gh pr create \
            --title "Migration Run: ${{ steps.branch-math.outputs.branch_name }}" \
            --body "$PR_BODY" \
            --draft \
            --base main \
            --head ${{ steps.branch-math.outputs.branch_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
