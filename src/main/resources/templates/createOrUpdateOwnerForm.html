{#include layout}
{#title}PetClinic :: Owner{/title}
{#menu}owners{/menu}
{#body}
  <h2>Owner</h2>
  <form class="form-horizontal" id="add-owner-form" method="post">
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label">First Name</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="firstName" value="{owner.firstName.orEmpty}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Last Name</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="lastName" value="{owner.lastName.orEmpty}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Address</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="address" value="{owner.address.orEmpty}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">City</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="city" value="{owner.city.orEmpty}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Telephone</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="telephone" value="{owner.telephone.orEmpty}" />
        </div>
      </div>
    </div>
    {#if errors.orEmpty}
    <div class="alert alert-danger">
      {#for error in errors}
        <p>{error.message}</p>
      {/for}
    </div>
    {/if}
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button class="btn btn-primary" type="submit">
          {#if owner.isNew()}Add Owner{#else}Update Owner{/if}
        </button>
      </div>
    </div>
  </form>
{/body}
{/include}
