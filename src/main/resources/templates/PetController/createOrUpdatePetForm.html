{#layout menu="owners"}

  <h2>
    {#if pet.isNew()}New {/if}Pet
  </h2>
  <form class="form-horizontal" method="post">
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label">Owner</label>
        <div class="col-sm-10">
          <span>{owner.firstName} {owner.lastName}</span>
        </div>
      </div>
      <div class="form-group">
        <label for="name" class="col-sm-2 control-label">Name</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" id="name" name="name" value="{pet.name}" />
        </div>
      </div>
      <div class="form-group">
        <label for="birthDate" class="col-sm-2 control-label">Birth Date</label>
        <div class="col-sm-10">
          <input class="form-control" type="date" id="birthDate" name="birthDate" value="{pet.birthDate}" />
        </div>
      </div>
      <div class="form-group">
        <label for="type" class="col-sm-2 control-label">Type</label>
        <div class="col-sm-10">
          <select name="type" id="type">
            {#for t in types}
            <option value="{t.name}" {#if pet.type != null && pet.type.name == t.name}selected{/if}>{t.name}</option>
            {/for}
          </select>
        </div>
      </div>
    </div>
    {#if error}
    <div class="alert alert-danger">{error}</div>
    {/if}
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button class="btn btn-primary" type="submit">
          {#if pet.isNew()}Add Pet{#else}Update Pet{/if}
        </button>
      </div>
    </div>
  </form>

{/layout}
